<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂武RPG - 星座の導き</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="game-container">
        <header>
            <div class="stats-bar">
                <div class="stat"><span class="label">FLOOR</span> <span id="current-floor">1</span></div>
                <div class="stat"><span class="label">GOLD</span> <span id="gold-amount">0</span></div>
                <div class="stat"><span class="label">神威</span> <span id="kamui-amount">0</span></div>
            </div>
            <div class="dungeon-selector">
                <button id="btn-dungeon-normal" class="btn-sm active">ダンジョン</button>
                <button id="btn-dungeon-rune" class="btn-sm">魂武ダンジョン</button>
            </div>
            <div class="class-selector">
                <label>職:</label>
                <select id="hero-class-select"></select>
            </div>
        </header>

        <main>
            <!-- Left Panel: Character & Tabs -->
            <section id="status-panel" class="panel">
                <div class="tab-nav">
                    <button class="tab-btn active" data-target="tab-status">ステータス</button>
                    <button class="tab-btn" data-target="tab-party">仲間</button>
                    <button class="tab-btn" data-target="tab-titles">称号</button>
                    <button class="tab-btn" data-target="tab-star">星座</button>
                    <button class="tab-btn" data-target="tab-kamui">神威</button>
                </div>

                <div id="tab-status" class="tab-content active">
                    <div class="status-card">
                        <div id="hero-level" class="level-display">総合Lv.1</div>
                        <div class="stat-grid">
                            <div class="stat-item"><span>HP</span> <span class="val"><span id="hero-hp">0</span> / <span id="hero-max-hp">0</span></span></div>
                            <div class="stat-item"><span>ATK</span> <span id="hero-atk" class="val">0</span></div>
                            <div class="stat-item"><span>DEF</span> <span id="hero-def" class="val">0</span></div>
                            <div class="stat-item"><span>CRI</span> <span id="hero-crit" class="val">0%</span></div>
                            <div class="stat-item"><span>AVO</span> <span id="hero-avoid" class="val">0%</span></div>
                        </div>
                    </div>
                    <div class="status-card">
                        <h3>装備中</h3>
                        <div id="equip-weapon" class="stat-item mt-1 clickable"><span>武器</span><span class="slot-item val">なし</span></div>
                        <div id="equip-armor" class="stat-item mt-1 clickable"><span>鎧</span><span class="slot-item val">なし</span></div>
                        <div id="equip-accessory" class="stat-item mt-1 clickable"><span>飾</span><span class="slot-item val">なし</span></div>
                    </div>
                </div>

                <div id="tab-party" class="tab-content">
                    <div class="status-card">
                        <h3>現在の仲間</h3>
                        <div id="party-list" class="merc-list"></div>
                    </div>
                    <div class="status-card mt-1">
                        <h3>酒場</h3>
                        <div id="tavern-list" class="merc-list"></div>
                    </div>
                </div>

                <div id="tab-titles" class="tab-content">
                    <div id="title-list" class="merc-list"></div>
                </div>

                <div id="tab-star" class="tab-content">
                    <div class="star-board-container">
                        <div class="star-board-ui">
                            <div class="board-chip">ポイント: <span id="passive-points-count">0</span></div>
                            <div class="board-chip">ドラッグで移動 / タップで解放</div>
                        </div>
                        <canvas id="passive-canvas"></canvas>
                    </div>
                </div>

                <div id="tab-kamui" class="tab-content">
                    <div class="status-card">
                        <p>獲得予定: <span id="kamui-gain-amount">0</span> ✨</p>
                        <button id="btn-prestige" class="btn btn-danger w-100 mt-1">転生する</button>
                        <div id="kamui-upgrades" class="mt-1"></div>
                    </div>
                </div>
            </section>

            <!-- Center Panel: Battle -->
            <section id="battle-panel" class="panel">
                <div class="battle-scene">
                    <div class="combatant hero">
                        <div class="sprite-container"><img id="hero-sprite" src="assets/hero.png" alt="Hero"></div>
                        <div class="hp-bar-container"><div id="hero-hp-bar" class="hp-bar"></div></div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="combatant">
                        <div id="enemy-name" class="name">???</div>
                        <div class="sprite-container"><img id="enemy-sprite" src="assets/slime.png" alt="Enemy"></div>
                        <div class="hp-bar-container"><div id="enemy-hp-bar" class="hp-bar"></div></div>
                    </div>
                </div>
                <div id="battle-controls">
                    <div class="control-row">
                        <button id="btn-toggle-auto" class="btn w-100">AUTO: OFF</button>
                        <button id="btn-retreat" class="btn btn-secondary w-100">撤退</button>
                    </div>
                    <div id="manual-controls" class="control-row">
                        <button id="btn-attack" class="btn w-100">通常攻撃</button>
                        <button id="btn-open-skills" class="btn btn-gold w-100">特技</button>
                    </div>
                    <div id="proceed-controls" class="control-row hidden">
                        <button id="btn-next-floor" class="btn btn-success w-100">次の階層へ</button>
                    </div>
                </div>
                <div id="battle-log"></div>
            </section>

            <!-- Right Panel: Inventory -->
            <section id="inventory-panel" class="panel">
                <div class="inventory-header">
                    <h3>インベントリ (<span id="inv-count">0</span>/50)</h3>
                </div>
                <div id="inventory-list"></div>
                <div class="inventory-actions">
                    <button id="btn-sell-weaker" class="btn btn-secondary w-100 mb-05">弱い装備を売却</button>
                    <button id="btn-sell-all" class="btn btn-danger w-100">コモン売却</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="skill-modal" class="modal hidden">
        <div class="modal-content">
            <h3>特技一覧</h3>
            <div id="skill-list" class="skill-list-container"></div>
            <button id="btn-close-skill-modal" class="btn btn-secondary w-100 mt-1">閉じる</button>
        </div>
    </div>

    <div id="rune-modal" class="modal hidden">
        <div class="modal-content">
            <h3>魂武装着</h3>
            <div id="rune-select-list" class="merc-list"></div>
            <button id="btn-close-rune-modal" class="btn btn-secondary w-100 mt-1">閉じる</button>
        </div>
    </div>

    <div id="item-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-item-name">アイテム名</h2>
            <div id="modal-item-stats" class="status-card mt-1"></div>
            <div id="modal-item-options" class="mt-1"></div>
            <div id="modal-item-sockets" class="mt-1"></div>
            <div id="modal-item-compare" class="mt-1"></div>
            <div class="modal-actions mt-1">
                <button id="btn-refine-item" class="btn btn-gold w-100">強化する</button>
                <button id="btn-equip-item" class="btn w-100">装備する</button>
                <button id="btn-sell-item" class="btn btn-danger w-100">売却する</button>
                <button id="btn-close-modal" class="btn btn-secondary w-100">閉じる</button>
            </div>
        </div>
    </div>

    <script src="main.js?v=2"></script>
</body>
</html>

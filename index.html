<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こんぶRPG - 栄光の復活</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="game-container">
        <header>
            <div class="stats-bar">
                <div class="stat"><span class="label">FLOOR</span> <span id="current-floor">1</span></div>
                <div class="stat"><span class="label">GOLD</span> <span id="gold-amount">0</span></div>
                <div class="stat"><span class="label">神威</span> <span id="kamui-amount">0</span></div>
            </div>
            <div class="dungeon-selector">
                <button id="btn-dungeon-normal" class="btn-sm active">ダンジョン</button>
                <button id="btn-dungeon-rune" class="btn-sm">魂武ダンジョン</button>
            </div>
            <div class="class-selector">
                <label>職業変更:</label>
                <select id="hero-class-select" class="btn-sm"></select>
            </div>
        </header>

        <main>
            <!-- Left Panel: Character Stats -->
            <section id="left-panel" class="panel">
                <div class="tabs">
                    <button class="tab-btn active" data-target="tab-status">主人公</button>
                    <button class="tab-btn" data-target="tab-party">仲間</button>
                    <button class="tab-btn" data-target="tab-titles">称号</button>
                    <button class="tab-btn" data-target="tab-kamui">神威</button>
                    <button class="tab-btn" data-target="tab-system">システム</button>
                </div>

                <div id="tab-status" class="tab-content active">
                    <div class="status-card">
                        <div id="hero-level" class="level-display">Lv.1</div>
                        <div class="stat-grid">
                            <div class="stat-item"><span>HP</span> <span class="val"><span id="hero-hp">0</span> / <span id="hero-max-hp">0</span></span></div>
                            <div class="stat-item"><span>ATK</span> <span id="hero-atk" class="val">0</span></div>
                            <div class="stat-item"><span>DEF</span> <span id="hero-def" class="val">0</span></div>
                        </div>
                        <div class="exp-bar-container">
                            <div class="exp-info">EXP: <span id="hero-exp">0</span> / <span id="hero-next-exp">0</span></div>
                            <div id="hero-exp-bar" class="exp-bar"></div>
                        </div>
                    </div>
                    <div class="equipment-card">
                        <h3>装備中</h3>
                        <div class="equip-slots">
                            <div id="equip-weapon" class="slot"><span class="slot-label">武器</span><div class="slot-item">なし</div></div>
                            <div id="equip-armor" class="slot"><span class="slot-label">防具</span><div class="slot-item">なし</div></div>
                            <div id="equip-accessory" class="slot"><span class="slot-label">装飾</span><div class="slot-item">なし</div></div>
                        </div>
                    </div>
                </div>

                <div id="tab-party" class="tab-content">
                    <div class="status-card">
                        <h3>現在の仲間</h3>
                        <div id="party-list" class="merc-list">
                            <!-- Mercs -->
                        </div>
                    </div>
                    <div class="status-card mt-1">
                        <h3>酒場 (雇用)</h3>
                        <div id="tavern-list" class="merc-list">
                            <!-- Available Mercs -->
                        </div>
                    </div>
                </div>

                <div id="tab-titles" class="tab-content">
                    <div class="status-card">
                        <h3>称号獲得・装備</h3>
                        <p class="item-stats">条件を満たすと称号を装備できます。</p>
                        <div id="title-list" class="merc-list">
                            <!-- Titles -->
                        </div>
                    </div>
                </div>

                <div id="tab-kamui" class="tab-content">
                    <div class="kamui-info">
                        <p>現在の階層に応じた「神威の欠片」を獲得し転生します。</p>
                        <p class="kamui-gain">獲得予定: <span id="kamui-gain-amount">0</span> ✨</p>
                        <button id="btn-prestige" class="btn btn-danger w-100 mt-1">転生する</button>
                    </div>
                    <h2 class="mt-1">神威強化 (永続)</h2>
                    <div id="kamui-upgrades"></div>
                </div>

                <div id="tab-system" class="tab-content">
                    <div class="status-card">
                        <h3>データ引き継ぎ</h3>
                        <p class="item-stats">セーブコードをコピーして他の環境へデータを移行できます。</p>
                        <div class="mt-1">
                            <button id="btn-export-code" class="btn btn-secondary w-100">セーブコードを発行</button>
                        </div>
                        <div class="mt-1">
                            <textarea id="save-code-area" class="save-code-area" placeholder="ここにコードを貼り付け"></textarea>
                            <button id="btn-import-code" class="btn btn-primary w-100">コードから読み込む</button>
                        </div>
                        <div class="mt-2 pt-1 border-top">
                            <button id="btn-reset-game" class="btn btn-danger w-100">全データを削除してリセット</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Center Panel: Battle Area -->
            <section id="battle-panel" class="panel">
                <div class="battle-scene">
                    <div class="combatant-group heroes">
                        <div class="combatant hero">
                            <div class="sprite-container"><img id="hero-sprite" src="assets/hero.png" alt="Hero"></div>
                            <div id="hero-hp-bar-outer" class="hp-bar-container">
                                <div id="hero-hp-bar" class="hp-bar"></div>
                            </div>
                        </div>
                        <div id="party-visual-list" class="party-visual-list"></div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="combatant enemy">
                        <div id="enemy-name" class="name">???</div>
                        <div class="sprite-container"><img id="enemy-sprite" src="assets/slime.png" alt="Enemy"></div>
                        <div class="enemy-hp-text"><span id="enemy-hp">0</span> / <span id="enemy-max-hp">0</span></div>
                        <div class="hp-bar-container">
                            <div id="enemy-hp-bar" class="hp-bar"></div>
                        </div>
                    </div>
                </div>

                <div id="battle-controls">
                    <div class="control-row">
                        <button id="btn-toggle-auto" class="btn active">AUTO: OFF</button>
                        <button id="btn-retreat" class="btn btn-secondary">撤退</button>
                    </div>
                    <div id="manual-controls" class="control-row">
                        <button id="btn-attack" class="btn">攻撃</button>
                        <button id="btn-open-skills" class="btn btn-skill">特技</button>
                    </div>
                    <div id="proceed-controls" class="control-row hidden">
                        <button id="btn-next-floor" class="btn btn-success">次の階層へ進む</button>
                    </div>
                </div>
                <div id="battle-log"></div>
            </section>

            <!-- Right Panel: Inventory -->
            <section id="inventory-panel" class="panel">
                <div class="inventory-header">
                    <h2>インベントリ</h2>
                    <span class="capacity"><span id="inv-count">0</span> / 50</span>
                </div>
                <div id="inventory-list"></div>
                <div class="inventory-actions">
                    <button id="btn-sell-weaker" class="btn btn-secondary w-100 mb-05">弱い装備を売却</button>
                    <button id="btn-sell-all" class="btn btn-danger w-100">コモンを一括売却</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="skill-modal" class="modal hidden">
        <div class="modal-content">
            <h3>特技一覧</h3>
            <div id="skill-list" class="skill-list-container"></div>
            <div class="modal-actions mt-1">
                <button id="btn-close-skill-modal" class="btn btn-cancel">閉じる</button>
            </div>
        </div>
    </div>

    <div id="rune-modal" class="modal hidden">
        <div class="modal-content">
            <h3>魂武装着</h3>
            <p>装着する魂武を選んでください</p>
            <div id="rune-select-list" class="merc-list"></div>
            <div class="modal-actions mt-1">
                <button id="btn-close-rune-modal" class="btn btn-cancel">閉じる</button>
            </div>
        </div>
    </div>

    <div id="item-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-item-name">アイテム名</h2>
            <div id="modal-item-stats" class="item-stats"></div>
            <div id="modal-item-options" class="item-options-list"></div>
            <div id="modal-item-sockets" class="socket-list"></div>
            <div id="modal-item-compare" class="item-compare"></div>
            <div class="modal-actions">
                <button id="btn-refine-item" class="btn btn-gold">強化する</button>
                <button id="btn-equip-item" class="btn">装備する</button>
                <button id="btn-sell-item" class="btn btn-secondary">売却する</button>
                <button id="btn-close-modal" class="btn btn-cancel">閉じる</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
